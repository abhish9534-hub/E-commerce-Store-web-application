# Default values for enterprise-fullstack-app.
# This is a YAML-formatted file.

global:
  environment: prod

frontend:
  name: frontend
  replicaCount: 2
  image:
    repository: enterprise-registry/frontend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 80

backend:
  name: backend
  replicaCount: 3
  image:
    repository: enterprise-registry/backend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 3000
  env:
    NODE_ENV: production
    LOG_LEVEL: info
  secrets:
    dbPassword: ""
    jwtSecret: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: artisan.enterprise.com
      paths:
        - path: /
          pathType: Prefix
        - path: /api
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
